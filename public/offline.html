<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>无法连接至服务器 - 小舟工具箱</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            background-image:
                radial-gradient(#111 1px, transparent 1px),
                radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: none;
            filter: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 400px;
            margin: 20px auto;
            border: 4px solid #4CAF50;
            background-color: #111;
            box-shadow:
                0 0 20px rgba(76, 175, 80, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .game-container {
                max-width: 300px;
                height: 300px;
            }
        }

        @media (max-width: 350px) {
            .game-container {
                max-width: 250px;
                height: 250px;
            }
        }

        .start-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #4CAF50;
            color: #4CAF50;
            font-size: 18px;
            cursor: pointer;
            box-shadow:
                inset 2px 2px 0 0px #4CAF50,
                inset -2px -2px 0 0px #000;
            line-height: 1.5;
        }

        .start-prompt:active,
        .start-prompt.pressed {
            box-shadow:
                inset 2px 2px 0 0px #000,
                inset -2px -2px 0 0px #4CAF50;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            max-width: 200px;
            margin: 20px auto;
            padding: 20px;
        }

        .control-btn {
            background-color: #333;
            color: #4CAF50;
            border: 2px solid #4CAF50;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            border-radius: 0;
            box-shadow:
                inset 2px 2px 0 0px #4CAF50,
                inset -2px -2px 0 0px #000;
        }

        .control-btn:active,
        .control-btn.pressed {
            box-shadow:
                inset 2px 2px 0 0px #000,
                inset -2px -2px 0 0px #4CAF50;
        }

        .up-btn { grid-column: 2; grid-row: 1; }
        .left-btn { grid-column: 1; grid-row: 2; }
        .down-btn { grid-column: 2; grid-row: 2; }
        .right-btn { grid-column: 3; grid-row: 2; }

        .info-section {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #111;
            border: 2px solid #4CAF50;
            line-height: 1.6;
        }

        .info-section h1 {
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
            margin-top: 0;
            font-size: 1.8em;
        }

        .info-section p { margin: 15px 0; }

        .info-section ul { list-style: none; padding-left: 0; }

        .info-section ul li {
            margin: 10px 0;
            padding-left: 20px;
            position: relative;
            list-style: none;
        }

        .info-section ul li:before {
            content: "■ ";
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
            font-size: 0.5em;
        }

        .info-section strong { color: #FFC107; }
        .info-section em { color: #90A4AE; }

        .pixel-art {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }

        .bit-text {
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="start-prompt" id="startPrompt">点击开始游戏</div>
        </div>

        <div class="controls">
            <div class="control-btn up-btn" id="upBtn">↑</div>
            <div class="control-btn left-btn" id="leftBtn">←</div>
            <div class="control-btn right-btn" id="rightBtn">→</div>
            <div class="control-btn down-btn" id="downBtn">↓</div>
        </div>

        <div class="info-section">
            <h1 class="bit-text">无法连接至服务器</h1>
            <ul>
                <li>请检查设备网络是否正常</li>
                <li>尝试更换DNS服务器</li>
                <li>您可以<a href="/" style="color:#4CAF50">返回首页</a>，使用已缓存的内容</li>
            </ul>
        </div>
    </div>

    <footer style="text-align:center;padding:20px;margin-top:20px;color:#4CAF50;font-family:'Courier New',monospace;border-top:1px solid #4CAF50">
        <p>&copy; 2026 小舟工具箱</p>
    </footer>

    <script>
        // 彩蛋相关变量
        var konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA','Enter'];
        var konamiIndex = 0;

        // 音效（优雅降级：文件不可用时静默失败）
        function tryAudio(src) { try { return new Audio(src); } catch(e) { return null; } }
        var eatSound = tryAudio('/icon/8-bit/eat.mp3');
        var deathSound = tryAudio('/icon/8-bit/death.mp3');
        var moveSound = tryAudio('/icon/8-bit/move.mp3');
        var konamiSound = tryAudio('/icon/8-bit/konami.mp3');

        function playSound(s) { if(s) s.play().catch(function(){}); }

        // 游戏变量
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var startPrompt = document.getElementById('startPrompt');

        function getGridSize() { return Math.floor(canvas.width / 20); }
        var gridSize = getGridSize();
        var tileCount = 20;
        var snake = [];
        var food = {};
        var dx = 0, dy = 0, score = 0;
        var gameRunning = false, gameLoop;
        var konamiModeActive = false;

        function initGame() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            dx = 1; dy = 0;
            generateFood();
            startPrompt.style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameRunning = true;
            gameLoop = setInterval(main, 250);
        }

        function generateFood() {
            food = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount) };
            for (var i = 0; i < snake.length; i++) {
                if (snake[i].x === food.x && snake[i].y === food.y) { generateFood(); break; }
            }
        }

        function drawGame() {
            gridSize = getGridSize();
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222';
            for (var i = 0; i < tileCount; i++)
                for (var j = 0; j < tileCount; j++)
                    ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize);
            ctx.fillStyle = '#4CAF50';
            for (var i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x*gridSize, snake[i].y*gridSize, gridSize, gridSize);
                if (i === 0) {
                    ctx.fillStyle = '#8BC34A';
                    ctx.fillRect(snake[i].x*gridSize, snake[i].y*gridSize, gridSize, gridSize);
                    ctx.fillStyle = '#4CAF50';
                }
            }
            ctx.fillStyle = '#FF5722';
            ctx.fillRect(food.x*gridSize, food.y*gridSize, gridSize, gridSize);
        }

        function moveSnake() {
            if (!gameRunning) return;
            var head = { x: snake[0].x + dx, y: snake[0].y + dy };
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                if (konamiModeActive) {
                    if (head.x < 0) head.x = 0; if (head.x >= tileCount) head.x = tileCount-1;
                    if (head.y < 0) head.y = 0; if (head.y >= tileCount) head.y = tileCount-1;
                } else { playSound(deathSound); gameOver(); return; }
            }
            for (var i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    if (!konamiModeActive) { playSound(deathSound); gameOver(); return; }
                }
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) { playSound(eatSound); generateFood(); score++; }
            else snake.pop();
        }

        function gameOver() {
            gameRunning = false; clearInterval(gameLoop);
            startPrompt.innerHTML = '游戏结束！<br>得分: ' + score + '<br>点击重新开始';
            startPrompt.style.display = 'block';
        }

        function main() { moveSnake(); drawGame(); }

        function activateKonamiMode() {
            konamiModeActive = true; playSound(konamiSound);
            var gc = document.querySelector('.game-container');
            gc.style.borderColor = '#f44336';
            gc.style.boxShadow = '0 0 20px rgba(244, 67, 54, 0.6)';
        }

        function checkKonamiCode(key) {
            if (key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) { activateKonamiMode(); konamiIndex = 0; }
            } else { konamiIndex = 0; if (key === konamiCode[0]) konamiIndex = 1; }
        }

        function changeDirection(event) {
            if (!gameRunning) return;
            switch(event.key) {
                case 'ArrowUp': if(dy===0){dx=0;dy=-1;playSound(moveSound);} break;
                case 'ArrowDown': if(dy===0){dx=0;dy=1;playSound(moveSound);} break;
                case 'ArrowLeft': if(dx===0){dx=-1;dy=0;playSound(moveSound);} break;
                case 'ArrowRight': if(dx===0){dx=1;dy=0;playSound(moveSound);} break;
            }
        }

        document.addEventListener('keydown', function(e) { checkKonamiCode(e.code); changeDirection(e); });

        function addButtonPressEffect(btn) { btn.classList.add('pressed'); setTimeout(function(){btn.classList.remove('pressed')},150); }

        document.getElementById('upBtn').addEventListener('click', function(){if(dy===0&&gameRunning){dx=0;dy=-1;playSound(moveSound)}addButtonPressEffect(this)});
        document.getElementById('downBtn').addEventListener('click', function(){if(dy===0&&gameRunning){dx=0;dy=1;playSound(moveSound)}addButtonPressEffect(this)});
        document.getElementById('leftBtn').addEventListener('click', function(){if(dx===0&&gameRunning){dx=-1;dy=0;playSound(moveSound)}addButtonPressEffect(this)});
        document.getElementById('rightBtn').addEventListener('click', function(){if(dx===0&&gameRunning){dx=1;dy=0;playSound(moveSound)}addButtonPressEffect(this)});

        canvas.addEventListener('click', function(){if(!gameRunning){score=0;initGame();playSound(moveSound)}addButtonPressEffect(startPrompt)});
        startPrompt.addEventListener('click', function(){if(!gameRunning){score=0;initGame()}addButtonPressEffect(startPrompt)});

        drawGame();
    </script>
</body>
</html>
