<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/app-icon/android-launchericon-192-192.png">
  <meta name="theme-color" content="#000000">
  <title>小舟工具箱 - Minecraft 基岩版指令工具聚合平台</title>

  <!-- 全屏加载动画：JS 未加载时显示，Vue 挂载后移除 -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 40px;
      height: 40px;
      position: relative;
      --c: no-repeat linear-gradient(#ffffff 0 0);
      background:
        var(--c) center/100% 10px,
        var(--c) center/10px 100%;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.35));
    }

    .loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        var(--c) 0 0,
        var(--c) 100% 0,
        var(--c) 0 100%,
        var(--c) 100% 100%;
      background-size: 15.5px 15.5px;
      animation: l16 1.5s infinite cubic-bezier(0.3, 1, 0, 1);
    }

    @keyframes l16 {
      33% {
        inset: -10px;
        transform: rotate(0deg)
      }

      66% {
        inset: -10px;
        transform: rotate(90deg)
      }

      100% {
        inset: 0;
        transform: rotate(90deg)
      }
    }

    .loading-text {
      color: #ffffff;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 18px rgba(255, 255, 255, 0.12);
    }
  </style>
  <script>
    // 预渲染兼容：仅浏览器环境执行
    if (typeof window !== 'undefined' && typeof localStorage !== 'undefined') {
      (function () {
        var params = new URLSearchParams(window.location.search);
        var urlTheme = params.get('theme');
        if (urlTheme && ['dark', 'light'].includes(urlTheme)) {
          localStorage.setItem('theme_mode', urlTheme);
        }
        document.documentElement.setAttribute('data-theme', 'dark');
      })();
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="90a3f550-9bcf-4f12-b7f0-c71590e84986"></script>
</head>

<body>
  <div id="loading-overlay">
    <div class="loader"></div>
    <div class="loading-text">LOADING…</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
